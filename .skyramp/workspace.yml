# Skyramp Workspace Configuration
workspace:
  repoName: tnautiyal/hotel-booking-2000
  repoUrl: https://github.com/tnautiyal/hotel-booking-2000
metadata:
  schemaVersion: v1
  mcpVersion: 0.1.6
  executorVersion: v1.3.23
  createdAt: "2026-05-10T19:23:16.105Z"
  updatedAt: "2026-05-10T19:23:16.113Z"
services:
  - serviceName: hotel-booking-backend
    language: typescript
    framework: playwright
    testDirectory: tests/hotel-booking-backend
    api:
      schemaPath: http://localhost:5000/api-docs
      authType: bearer
      authHeader: Authorization
      baseUrl: http://localhost:5000
    runtimeDetails:
      serverStartCommand: docker compose up -d backend
      runtime: docker
      dockerNetwork: hotel-booking-2000_default
  - serviceName: hotel-booking-frontend
    language: typescript
    framework: playwright
    testDirectory: tests/hotel-booking-frontend
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:5174
    runtimeDetails:
      serverStartCommand: npm run dev
      runtime: local
  - serviceName: e2e-tests
    language: typescript
    framework: playwright
    testDirectory: e2e-tests/tests
    api:
      authType: none
      authHeader: ""
      baseUrl: http://localhost:5174
    runtimeDetails:
      serverStartCommand: npx playwright test
      runtime: local
